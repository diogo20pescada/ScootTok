<!DOCTYPE html>
<html>

<head>
<title>ScootTok</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0f1c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ScootTok">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="shell">

<section id="login" class="login-card">
<h1>🛴 ScootTok</h1>
<p class="subtitle">Entra, publica vídeos e personaliza o teu canal.</p>

<div class="form-grid">
<input id="user" placeholder="Username">
<input id="pass" placeholder="Password" type="password">
</div>

<div class="auth-actions">
<button onclick="login()">Login</button>
<button class="secondary" onclick="register()">Criar conta</button>
</div>
</section>

<section id="app" class="app-shell hidden">
<header class="topbar">
<h1 class="topbar-logo">🛴 ScootTok</h1>

<div class="topbar-tabs">
<button id="exploreBtn" class="tab active" onclick="loadVideos()">Explorar</button>
<button id="followingBtn" class="tab" onclick="loadFollowing()">A seguir</button>
</div>

<div class="topbar-right">
<div id="searchWrap" class="search-wrap">
<button class="search-action-btn" onclick="toggleSearch()" aria-label="Pesquisar vídeos">🔍</button>
<input id="searchInput" class="search-input" placeholder="Pesquisar vídeos, descrição ou creator" onkeydown="handleSearchKeydown(event)" oninput="handleSearchInput()">
<button class="search-action-btn" onclick="clearSearch()" aria-label="Limpar pesquisa">✕</button>
</div>

<div class="menu-area">
<button class="ghost icon-btn" onclick="toggleMenu()">⋯</button>
<div id="menuDropdown" class="menu-dropdown hidden">
<p id="welcomeText" class="muted" style="padding:4px 8px;font-size:13px;pointer-events:none"></p>
<button onclick="openCustomizeModal()">Personalizar</button>
<button class="danger" onclick="logout()">Sair</button>
</div>
</div>
</div>
</header>

<section id="uploadCard" class="hidden">
<div class="upload-inner">
<div class="upload-panel-header">
<h2>Postar vídeo</h2>
<button class="secondary" onclick="showFeedView()">← Voltar</button>
</div>
<div class="panel-card">
<div class="form-grid">
<input id="title" placeholder="Título do vídeo">
<input id="desc" placeholder="Descrição (opcional)">
<input type="file" id="video" accept="video/*">
<div>
<p class="muted" style="margin:0 0 6px;font-size:13px">Capa do vídeo (opcional)</p>
<input type="file" id="thumbnail" accept="image/*">
</div>
</div>
<button onclick="upload()">Publicar vídeo</button>
</div>
</div>
</section>

<section id="feedSection">
<h2 id="sectionTitle" class="hidden"></h2>
<div id="feed" class="feed"></div>
</section>

<section id="profileSection" class="hidden">
<div class="profile-inner">
<div class="panel-card">
<div class="upload-panel-header">
<h2 id="profileTitle">O teu perfil</h2>
<button class="secondary" onclick="showFeedView()">← Voltar</button>
</div>

<div class="profile-header-card">
<button id="profileAvatarButton" class="avatar-shell" onclick="handleProfileAvatarClick()">
<img id="profileAvatarLarge" class="avatar-img hidden" alt="Foto de perfil">
<span id="profileAvatarFallbackLarge" class="avatar-fallback">👤</span>
</button>

<div>
<h3 id="profileDisplayName"></h3>
<p id="profileUsername" class="muted"></p>
<p id="profileFollowers" class="muted"></p>
<p id="profileHint" class="muted" style="font-size:13px;margin-top:4px">Aqui aparecem todos os teus vídeos, views únicas e corações.</p>
</div>
</div>
</div>

<div id="profileVideos" class="feed"></div>
</div>
</section>

<button id="profileFab" class="profile-fab" onclick="openProfileView()">
<img id="profileAvatarSmall" class="avatar-img hidden" alt="Foto de perfil">
<span id="profileAvatarFallbackSmall" class="avatar-fallback">👤</span>
</button>

<button id="uploadFab" class="upload-fab" onclick="openUploadView()" aria-label="Abrir página de publicação de vídeo">+</button>
</section>

<div id="customizeModal" class="modal hidden">
<div class="modal-card">
<div class="section-header">
<h2>Personalizar canal</h2>
<button class="ghost icon-btn" onclick="closeCustomizeModal()">✕</button>
</div>

<div class="form-grid">
<input id="displayNameInput" placeholder="Nome do canal">
<input id="avatarInput" type="file" accept="image/*">
</div>

<p class="muted">Podes começar com o boneco e depois trocar por uma foto de perfil.</p>

<div class="auth-actions">
<button onclick="saveProfile()">Guardar</button>
<button class="secondary" onclick="closeCustomizeModal()">Cancelar</button>
</div>
</div>

<div id="searchPreviewModal" class="modal hidden">
<div class="modal-card search-preview-card">
<div class="section-header">
<h2 id="searchPreviewTitle">Preview</h2>
<button class="ghost icon-btn" onclick="closeSearchPreview()">✕</button>
</div>
<video id="searchPreviewVideo" controls playsinline style="width:100%;border-radius:16px;background:#000"></video>
</div>
</div>
</div>
</div>

<script src="app.js"></script>

</body>
</html>
